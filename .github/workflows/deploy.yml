name: CD — Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:     # يسمح بـ manual trigger من الـ Actions tab

jobs:
  # ── Job 1: Tests must pass before deploy ──────────────────
  test:
    name: Run Tests (Gate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore & Build
        run: dotnet build --configuration Release

      - name: Run Tests
        run: |
          dotnet test Sportive.API.Tests/Sportive.API.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "console;verbosity=minimal"
        env:
          JWT__Secret: "ci-test-secret-key-minimum-32-characters!!"
          JWT__Issuer: "Sportive.API.Tests"
          JWT__Audience: "Sportive.Client.Tests"
          ADMIN_EMAIL: "admin@test.com"
          ADMIN_PASSWORD: "Admin@Test123"

  # ── Job 2: Deploy (only runs if tests pass) ────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test          # ← هيتنفذ بس لو job test عدى بنجاح

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service Sportive.API --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
