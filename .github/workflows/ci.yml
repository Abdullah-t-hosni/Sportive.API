name: Sportive API — CI Build & Validate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Sportive.API/Sportive.API.csproj

      - name: Build (Release)
        run: dotnet build Sportive.API/Sportive.API.csproj --configuration Release --no-restore

      - name: Check for secrets in code
        # ✅ يمنع رفع credentials حقيقية بالخطأ
        run: |
          if grep -r "Password=Abdo\|ApiSecret.*swm\|ApiKey.*771912\|HmacSecret.*1C96" Sportive.API/ --include="*.cs" --include="*.json" 2>/dev/null; then
            echo "❌ SECURITY: Found hardcoded credentials! Please use environment variables."
            exit 1
          fi
          echo "✅ No hardcoded credentials found."

      - name: Verify appsettings.json is gitignored
        run: |
          if git ls-files --error-unmatch Sportive.API/appsettings.json 2>/dev/null; then
            echo "❌ SECURITY: appsettings.json is tracked by git! Add it to .gitignore immediately."
            exit 1
          fi
          echo "✅ appsettings.json is properly gitignored."

      - name: Check for TODO/FIXME security items
        run: |
          count=$(grep -r "CHANGE_ME\|REPLACE_WITH\|YOUR_DB_PASSWORD" Sportive.API/ --include="*.cs" 2>/dev/null | wc -l)
          echo "Found $count placeholder(s) in .cs files (these are OK — placeholders only)"

